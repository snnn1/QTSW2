name: Replay Determinism

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  determinism:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore modules/robot/replay/Robot.Replay.csproj

      - name: Determinism test (golden replay)
        env:
          REPLAY_HOST_VERSION: ${{ github.sha }}
        run: |
          dotnet run --project modules/robot/replay/Robot.Replay.csproj -c Release --no-build -- \
            --determinism-test --file modules/robot/replay/sample_replay.jsonl

  watchdog-session-flatten:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest + pytz
        run: pip install pytest pytz

      - name: Session flatten replay tests
        run: |
          python -m pytest modules/watchdog/tests/test_session_flatten_synthetic_replay.py modules/watchdog/tests/test_session_flatten_golden_day.py -v

  incident-packs:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: |
          dotnet restore modules/robot/replay/Robot.Replay.csproj
          dotnet restore modules/robot/replay_host/Robot.ReplayHost.csproj

      - name: Build
        run: |
          dotnet build modules/robot/replay/Robot.Replay.csproj -c Release --no-restore
          dotnet build modules/robot/replay_host/Robot.ReplayHost.csproj -c Release --no-restore

      - name: Run incident packs
        env:
          REPLAY_HOST_VERSION: ${{ github.sha }}
        run: |
          $incidentsDir = "modules/robot/replay/incidents"
          if (-not (Test-Path $incidentsDir)) {
            Write-Host "No incidents directory, skipping"
            exit 0
          }
          $failed = $false
          $dirs = Get-ChildItem -Path $incidentsDir -Directory | Sort-Object Name
          foreach ($dir in $dirs) {
            $canonical = Join-Path $dir.FullName "canonical.json"
            $expected = Join-Path $dir.FullName "expected.json"
            if (-not (Test-Path $canonical)) {
              Write-Host "Skipping $($dir.Name): no canonical.json"
              continue
            }
            if (Test-Path (Join-Path $dir.FullName ".ci-skip")) {
              Write-Host "Skipping $($dir.Name): .ci-skip (negative control)"
              continue
            }
            Write-Host "Running incident pack: $($dir.Name)"
            $hostArgs = @("--determinism-test", "--file", $canonical)
            if (Test-Path $expected) {
              $hostArgs += "--run-invariants", "--expected", $expected
            }
            $proc = Start-Process -FilePath "dotnet" -ArgumentList @("run", "--project", "modules/robot/replay_host/Robot.ReplayHost.csproj", "-c", "Release", "--no-build", "--") + $hostArgs -NoNewWindow -Wait -PassThru
            if ($proc.ExitCode -ne 0) {
              Write-Host "FAIL: $($dir.Name)"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
